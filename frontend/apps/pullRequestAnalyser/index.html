<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Repository Pull Request Analyser</title>

    <link href="./img/favicon.svg" rel="icon" type="image/svg+xml">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@300;400;500;700&display=swap');

        /* ── CSS Variables for theme ── */
        :root {
            --bg-grad-a: #020024;
            --bg-grad-b: #090979;
            --bg-grad-c: #00d4ff;
            --text-color: floralwhite;
            --input-bg: rgba(255, 255, 255, 0.95);
            --input-color: #111;
            --box-bg: rgba(174, 236, 236, 0.18);
            --box-border: rgba(255, 255, 255, 0.25);
            --box-shadow: rgba(0, 212, 255, 0.18);
            --aside-bg: rgba(255,255,255,0.04);
            --aside-border: rgba(255,255,255,0.10);
            --nav-bg: rgba(2, 0, 36, 0.55);
            --nav-border: rgba(255,255,255,0.08);
            --footer-color: rgba(255,255,255,0.55);
            --indicator-idle: #6b7280;
            --indicator-glow: #00d4ff;
            --tag-bg: rgba(0, 212, 255, 0.12);
            --tag-border: rgba(0, 212, 255, 0.3);
        }

        [data-theme="light"] {
            --bg-grad-a: #e0f7ff;
            --bg-grad-b: #b3e5fc;
            --bg-grad-c: #0277bd;
            --text-color: #0a1628;
            --input-bg: rgba(255,255,255,0.98);
            --input-color: #111;
            --box-bg: rgba(255, 255, 255, 0.65);
            --box-border: rgba(2, 119, 189, 0.3);
            --box-shadow: rgba(2, 119, 189, 0.15);
            --aside-bg: rgba(255,255,255,0.55);
            --aside-border: rgba(2, 119, 189, 0.15);
            --nav-bg: rgba(255,255,255,0.70);
            --nav-border: rgba(2, 119, 189, 0.12);
            --footer-color: rgba(10, 22, 40, 0.5);
            --indicator-idle: #9ca3af;
            --indicator-glow: #0277bd;
            --tag-bg: rgba(2, 119, 189, 0.1);
            --tag-border: rgba(2, 119, 189, 0.3);
        }

        /* ── Reset & Base ── */
        *, *::before, *::after { box-sizing: border-box; }
        html { padding: 0; margin: 0; }

        body {
            font-family: "Red Hat Text", sans-serif;
            background: linear-gradient(135deg, var(--bg-grad-a), var(--bg-grad-b), var(--bg-grad-c));
            color: var(--text-color);
            font-size: 1.2rem;
            text-align: center;
            min-height: 100vh;
            padding-top: 70px;
            transition: background 0.4s ease, color 0.3s ease;
        }

        /* ── Nav ── */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            background: var(--nav-bg);
            border-bottom: 1px solid var(--nav-border);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            padding: 0 28px;
            transition: background 0.3s;
        }

        nav ul {
            display: flex;
            align-items: center;
            justify-content: space-between;
            list-style: none;
            margin: 0;
            padding: 10px 0;
            gap: 16px;
        }

        nav ul li { display: flex; align-items: center; }

        nav ul li img { height: 36px; display: block; }

        nav h2 {
            margin: 0;
            font-size: 1.05rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            color: var(--text-color);
            white-space: nowrap;
        }

        /* ── Theme Toggle ── */
        .toggle {
            position: relative;
            display: inline-block;
            cursor: pointer;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
            position: absolute;
        }

        .toggle-track {
            display: flex;
            align-items: center;
            width: 52px;
            height: 28px;
            border-radius: 14px;
            background: rgba(255,255,255,0.12);
            border: 1.5px solid rgba(255,255,255,0.22);
            padding: 3px;
            transition: background 0.3s, border-color 0.3s;
            position: relative;
        }

        .toggle input:checked ~ .toggle-track {
            background: rgba(0,212,255,0.18);
            border-color: rgba(0,212,255,0.45);
        }

        .toggle-indicator {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: floralwhite;
            box-shadow: 0 1px 4px rgba(0,0,0,0.35);
            transition: transform 0.3s cubic-bezier(.4,0,.2,1), background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle input:checked ~ .toggle-track .toggle-indicator {
            transform: translateX(24px);
            background: #0277bd;
        }

        .checkMark svg {
            width: 13px;
            height: 13px;
            fill: rgba(255,255,255,0.75);
            display: block;
        }

        /* ── Page grid wrapper ── */
        #page-wrapper {
            display: grid;
            grid-template-columns: 3fr 1fr;
            grid-template-rows: auto 1fr;
            gap: 0 20px;
            max-width: 1280px;
            margin: 0 auto;
            padding: 36px 28px 60px;
            min-height: calc(100vh - 70px);
            align-items: start;
        }

        /* ── Main layout ── */
        main {
            grid-column: 1;
            grid-row: 1 / 3;
            padding: 0;
            min-width: 0; /* prevent overflow in grid */
        }

        /* ── Input row ── */
        #link-div {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: nowrap;
            margin-bottom: 36px;
        }

        #PRLink {
            width: 100%;
            max-width: 520px;
            padding: 14px 20px;
            border: none;
            border-radius: 14px;
            background: var(--input-bg);
            color: var(--input-color);
            font-size: 1rem;
            font-weight: 600;
            font-family: "Red Hat Text", sans-serif;
            outline: none;
            box-shadow:
                0 6px 18px rgba(0,0,0,0.25),
                0 0 12px rgba(255,255,255,0.10);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        #PRLink:focus {
            transform: scale(1.015);
            box-shadow:
                0 0 0 3px rgba(0, 212, 255, 0.35),
                0 10px 28px rgba(0,0,0,0.3);
        }

        #PRLink::placeholder {
            color: #777;
            font-style: italic;
            letter-spacing: 0.5px;
        }

        /* ── Indicator explainer label ── */
        #indicator-explainer {
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            color: rgba(255,255,255,0.45);
            min-width: 90px;
            text-align: right;
            flex-shrink: 0;
            transition: color 0.3s ease;
            font-style: italic;
            line-height: 1.3;
        }

        /* States driven by JS — mirror the indicator colours */
        #indicator-explainer.state-red    { color: #ff6b6b; }
        #indicator-explainer.state-orange { color: #ffd000; }
        #indicator-explainer.state-yellow { color: #ffe066; }
        #indicator-explainer.state-green  { color: #4ade80; }

        /* ── Guider hint ── */
        .guider {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 14px;
            padding-right: 4px;
        }

        .guider span {
            font-size: 0.75rem;
            font-weight: 400;
            color: rgba(255,255,255,0.4);
            font-style: italic;
            letter-spacing: 0.02em;
            max-width: 240px;
            text-align: right;
            line-height: 1.5;
            border-left: 2px solid rgba(0,212,255,0.25);
            padding-left: 10px;
        }

        /* ── Status Indicator dot ── */
        /* ── Status Indicator dot ── */
#indicator {
    width: 22px;
    height: 22px;
    min-width: 22px;
    border-radius: 50%;
    background: var(--indicator-idle);
    display: inline-block;
    box-shadow: 0 0 0 4px rgba(107, 114, 128, 0.2);
    transition: background 0.3s ease, box-shadow 0.3s ease;
    flex-shrink: 0;
}

        /* JS can add these classes to indicate state */
        #indicator.active {
            background: #22c55e;
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.25), 0 0 10px rgba(34, 197, 94, 0.4);
            animation: pulse 1.8s infinite;
        }

        #indicator.loading {
            background: #f59e0b;
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.25);
            animation: pulse 0.9s infinite;
        }

        #indicator.error {
            background: #ef4444;
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.25);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ── Content section header ── */
        #content-div h4 {
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin: 0 0 14px;
            color: rgba(255,255,255,0.5);
        }

        /* ── Content Box ── */
        #content-box {
            width: 100%;
            min-height: 220px;
            margin: 0 auto;
            padding: 28px 32px;
            border-radius: 20px;
            border: 1px solid var(--box-border);
            background: var(--box-bg);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            color: var(--text-color);
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.04) inset,
                0 12px 40px var(--box-shadow);
            transition: all 0.3s ease;
            text-align: left;
            font-size: 0.95rem;
            line-height: 1.7;
            position: relative;
            overflow: hidden;
        }

        /* Subtle shimmer line at top of card */
        #content-box::before {
            content: '';
            position: absolute;
            top: 0; left: 12%; right: 12%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,212,255,0.5), transparent);
            border-radius: 1px;
        }

        /* Empty-state placeholder text */
        #content-box.empty {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: rgba(255,255,255,0.35);
            font-style: italic;
            font-size: 0.9rem;
        }

        /* ── Aside — right column ── */
        aside {
            grid-column: 2;
            grid-row: 1 / 3;
            position: sticky;
            top: 86px; /* nav height + gap */
            max-height: calc(100vh - 110px);
            display: flex;
            flex-direction: column;
            border-radius: 18px;
            border: 1px solid var(--aside-border);
            background: var(--aside-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
            transition: background 0.3s, border-color 0.3s;
        }

        .pullRequestHeadDiv {
            padding: 18px 20px 14px;
            border-bottom: 1px solid var(--aside-border);
            flex-shrink: 0;
        }

        .pullRequestHeadDiv p {
            margin: 0;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.13em;
            text-transform: uppercase;
            color: rgba(0, 212, 255, 0.75);
        }

        .pullRequestListDiv {
            flex: 1;
            overflow-y: auto;
            padding: 12px 14px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.45);
            font-style: italic;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.12) transparent;
        }

        .pullRequestListDiv::-webkit-scrollbar {
            width: 4px;
        }
        .pullRequestListDiv::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.12);
            border-radius: 4px;
        }

        .pullRequestListDiv p {
            margin: 0;
            text-align: center;
            padding-top: 20px;
        }

        /* Responsive — stack on small screens */
        @media (max-width: 768px) {
            #page-wrapper {
                grid-template-columns: 1fr;
                padding: 24px 16px 40px;
            }
            aside {
                grid-column: 1;
                grid-row: auto;
                position: static;
                max-height: 280px;
                margin-top: 20px;
            }
        }

        /* ── Footer ── */
        footer {
            padding: 20px 0 28px;
        }

        .langbox {
            color: var(--footer-color);
            text-align: center;
            cursor: default;
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: color 0.3s;
        }

        .langsel {
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid var(--tag-border);
            background: var(--tag-bg);
            color: var(--text-color);
            font-size: 0.75rem;
            font-family: "Red Hat Text", sans-serif;
            letter-spacing: 0.05em;
            transition: background 0.2s, transform 0.15s;
        }

        .langsel:hover {
            background: rgba(0,212,255,0.2);
            transform: translateY(-1px);
        }
    </style>
</head>

<body>

<nav>
    <ul>
        <li><a href="https://tekmonks.com/apps/tekmonks/index.html?.=aHR0cHM6Ly90ZWttb25rcy5jb20vYXBwcy90ZWttb25rcy9ob21lLmh0bWw%3D" target="_blank"><img src="../pullRequestAnalyser/img/logo.svg" alt="Logo"></a></li>
        <li><h2>GitHub Repository PR Analyser</h2></li>
        <li>
            <label class="toggle toggle-dark">
                <input type="checkbox" id="themeToggle">
                <span class="toggle-track">
                    <span class="toggle-indicator">
                        <span class="checkMark">
                            <svg viewBox="0 0 24 24" id="gh-dark-mode-checkmark">
                                <path d="M19.77,5.03L8.47,16.33L4.23,12.1L5.64,10.69L8.47,13.52L18.36,3.62L19.77,5.03Z"></path>
                            </svg>
                        </span>
                    </span>
                </span>
            </label>
        </li>
    </ul>
</nav>

<div id="page-wrapper">

<main>
    
    <div id="link-div">
        <span id="indicator-explainer"></span>
        <input type="text" placeholder="Enter owner/repo/pull-number..." id="PRLink">
        <span id="indicator"></span>
    </div>

    <div class="guider">
        <span>Click a Pull Request to view its changes.</span>
    </div>

    <div id="content-div">
        <h4>Analysis Output ↓</h4>
        <div id="content-box" class="empty">Content will appear here...</div>
    </div>

</main>

<aside>
    <div class="pullRequestHeadDiv">
        <p>List of All Pulls for this Repository</p>
    </div>
    <div class="pullRequestListDiv">
        <p>Select a Repo to load the list of all Pulls</p>
    </div>
</aside>

</div><!-- /#page-wrapper -->

<footer>
    <div class="langbox">
        <span class="langsel" onclick="language.changeLanguage('en')">English</span>
        <span class="langsel" onclick="language.changeLanguage('hi')">हिंदी</span>
        <span class="langsel" onclick="language.changeLanguage('ja')">日本語</span>
    </div>
</footer>

<script type="text/javascript" src="/framework/js/$$.js"></script>
<script type="module" src="./js/index.mjs"></script>

</body>
</html>
