<!DOCTYPE html>
<html lang="en">
<head>

    <link href="./img/favicon.svg" rel="icon" type="image/svg+xml">
    <style>
        html{
          padding:0;
          margin:0;  
        }
        body{
            background-color: navy;
            color:floralwhite;
            font-size: 1.5rem;
            text-transform: uppercase;
            display: block;
            text-align: center;
            align-items: center;
            justify-content: center;
        }
        #PRLink{
            background-color: white;
            color: black;
        }
        #PRLink::placeholder{
            color:dimgray;
        }
        #submit-btn {
            width: 49px;
            height: 28px;
            background-color: #ec2c21;   /* button color */
            color: white;                /* text color */
            padding: 6px 10px;          /* space inside */
            border: none;                /* remove default border */
            border-radius: 4px;          /* rounded corners */
            font-size: 8px;
            cursor: pointer;             /* shows hand on hover */
            transition: background-color 0.3s ease;
            text-align: center;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
}

        #submit-btn:hover {
            background-color: #b31919;   /* darker on hover */
        }

        #submit-btn:active {
            transform: scale(0.98);      /* slight press effect */
        }
        #content-box{
            color:black;
            background-color: white;
        }


    </style>
</head>
